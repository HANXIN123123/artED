<style>
@font-face {
    font-family: 'DnfBitbeatV2';
    src: url('//cdn.df.nexon.com/img/common/font/DNFBitBitv2.otf')format('opentype');
    font-weight: 400;
    font-display: swap;
}
</style>
<style>
    details:not(.custom-details) {
        font-family: DnfBitbeatV2;
        box-shadow: inset 0 3px 0px rgba(173, 154, 224, 1), 0 5px 0px rgba(173, 154, 224, 1), 0 10px 0px rgba(220, 211, 255, 1);
        margin: 20px auto;
        background: linear-gradient(#dcd3ff, #b5a1fd);
        color: #FFFFFF;
        text-shadow: -2px 0 #8c78d4, 0 2px #8c78d4, 2px 0 #8c78d4, 0 -2px #8c78d4;
        text-align: center;
        font-size: 15px;
        padding: 5px;
        border-radius: 10px;
        transition: all 0.3s ease-in-out;
        max-width: 1180px;
        position: relative;
    }

    details[open] {
        background: #fff;
    }

    summary {
        cursor: pointer;
        font-size: 1.5em;
        outline: none;
        margin: 0;
        transition: color 0.3s ease;
        position: relative;
        display: inline-block;
        z-index: 1;
    }

    summary::marker {
        display: none;
    }

    summary:hover {
        color: #8c78d4;
    }

    details[open] summary:not(.custom-summary) {
        color: #8c78d4;
        text-shadow: none;
    }

    summary:not(.custom-summary)::before {
        content: '';
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 110%;
        height: 0%;
        background-color: #ffd400;
        z-index: 0;
        border-radius: 10px;
    }

    details>div {
        animation: reveal 0.5s ease;
        margin-top: 0px;
    }

    img {
        max-width: 100%;
        height: auto;
        border-radius: 5px;
        margin-top: 0px;
    }

    summary::after {
        content: '▼';
        display: block;
        color: #8c78d4;
        text-shadow: none;
        font-size: 10px;
        margin-top: 0px;
        transition: transform 0.3s ease;
    }

    details[open] summary::after {
        content: '▲';
    }

    @keyframes reveal {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
